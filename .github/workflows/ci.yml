name: Check PR

on: [pull_request]

jobs:
  run-ci:
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    name: Type Check, Test, Build & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          # Keep the CI Node version in sync with `.nvmrc` for reproducible builds.
          node-version-file: '.nvmrc'
          # Cache the pnpm store so subsequent runs restore dependencies instead of
          # downloading the full store on every PR.
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types
        run: pnpm type-check

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # The build only needs env validation to pass; real secrets are injected
          # per-environment at deploy time, not in CI.
          SKIP_ENV_VALIDATION: 'true'

      - name: Check Oxfmt
        run: pnpm format:ci

      - name: Check linting
        run: pnpm lint

      - name: Check commits messages
        uses: wagoid/commitlint-github-action@v6
